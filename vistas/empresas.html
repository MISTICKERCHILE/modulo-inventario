<div id="modal-vincular-usuario" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center backdrop-blur-sm p-4">
    <div class="bg-white p-6 md:p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-emerald-500">
        <h2 class="text-xl font-bold text-slate-800 mb-1">👥 Dar Acceso a Usuario</h2>
        <p class="text-xs text-slate-500 mb-4">El usuario debe haberse registrado previamente en la pantalla principal usando este correo.</p>
        <form id="form-vincular-usuario" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">Selecciona la Empresa</label>
                <select id="vu-empresa" required class="w-full px-4 py-3 border border-slate-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none font-medium bg-white"></select>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">Correo Electrónico Registrado</label>
                <input type="email" id="vu-email" required class="w-full px-4 py-3 border border-slate-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none text-sm" placeholder="ejemplo@correo.com">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">Nivel de Acceso (Rol)</label>
                <select id="vu-rol" required class="w-full px-4 py-3 border border-slate-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none font-medium bg-white">
                    <option value="Operador">Operador (Acceso Estándar)</option>
                    <option value="Admin">Administrador (Acceso Total)</option>
                </select>
            </div>
            <div class="flex justify-end gap-3 mt-6 border-t pt-4">
                <button type="button" onclick="document.getElementById('modal-vincular-usuario').classList.add('hidden')" class="px-4 py-2 text-slate-600 font-bold">Cancelar</button>
                <button type="submit" class="px-6 py-2 bg-emerald-600 text-white rounded-md font-bold shadow">Vincular Usuario</button>
            </div>
        </form>
    </div>
</div>

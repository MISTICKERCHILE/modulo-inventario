<div class="flex flex-col md:flex-row gap-6 h-[calc(100vh-8rem)]">
    
    <div id="menu-lateral-catalogos" class="w-full md:w-64 shrink-0 overflow-y-auto pr-2 block">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">⚙️ Catálogos</h2>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 px-3">Productos e Insumos</h3>
            <div class="flex flex-col space-y-1">
                <button onclick="cambiarVista('productos')" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors w-full flex justify-between items-center outline-none">
                    <span>📦 Productos</span>
                    <span class="text-slate-400 text-sm">↗️</span>
                </button>
                <button onclick="cambiarTab('categorias')" id="tab-categorias" class="text-left px-4 py-2 rounded-lg font-bold text-emerald-700 bg-emerald-50 border border-emerald-100 shadow-sm">📁 Categorías</button>
                <button onclick="cambiarTab('unidades')" id="tab-unidades" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">⚖️ Unidades de Medida</button>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 px-3">Logística y Compras</h3>
            <div class="flex flex-col space-y-1">
                <button onclick="cambiarTab('proveedores')" id="tab-proveedores" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">🚚 Proveedores</button>
                <button onclick="cambiarTab('tipos_movimiento')" id="tab-tipos_movimiento" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">🔄 Tipos de Movimiento</button>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 px-3">Organización</h3>
            <div class="flex flex-col space-y-1">
                <button onclick="cambiarTab('sucursales')" id="tab-sucursales" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">🏢 Sucursales</button>
                <button onclick="cambiarTab('ubicaciones')" id="tab-ubicaciones" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">📍 Ubicaciones Internas</button>
            </div>
        </div>

        <div class="mb-6">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-2 px-3">Ventas POS</h3>
            <div class="flex flex-col space-y-1">
                <button onclick="cambiarTab('clientes')" id="tab-clientes" class="text-left px-4 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">👤 Clientes</button>
            </div>
        </div>
    </div>

    <div id="area-contenido-catalogos" class="hidden md:block flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 overflow-y-auto w-full">
        
        <button onclick="volverMenuMobileCat()" class="md:hidden mb-6 flex items-center justify-center gap-2 text-emerald-700 font-bold bg-emerald-50 border border-emerald-200 px-4 py-3 rounded-xl w-full shadow-sm active:bg-emerald-100 transition-colors">
            ← Volver al Menú de Catálogos
        </button>
        
        <div id="seccion-productos" class="hidden space-y-4">
            <div class="text-center py-20">
                <span class="text-6xl mb-4 block">📦</span>
                <h3 class="text-xl font-bold text-slate-700">Migración de Productos</h3>
                <p class="text-slate-500 mt-2">Aquí mudaremos tu tabla de productos en el próximo paso.</p>
            </div>
        </div>

        <div id="seccion-clientes" class="hidden space-y-4">
            
            <div class="bg-blue-50 border border-blue-200 p-4 rounded-xl mb-4 flex items-center justify-between shadow-sm">
                <div>
                    <h3 class="font-bold text-blue-800 text-lg flex items-center gap-2">👥 Base de Clientes (CRM)</h3>
                    <p class="text-xs text-blue-600 mt-1">Registra sus datos aquí para facturación rápida en el POS y envíos.</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-4xl hidden md:block opacity-80" id="icono-crm-clientes">💌</span>
                    <button id="btn-volver-pos-clientes" onclick="volverAPosDesdeClientes()" class="hidden bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-xl font-black shadow-md transition-transform hover:scale-105 outline-none flex items-center gap-2">
                        <span>🔙</span> Volver al POS
                    </button>
                </div>
            </div>
            
            <form id="form-cliente" class="bg-slate-50 p-6 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Completo / Razón Social</label>
                    <input type="text" id="nombre-cliente" required class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">RUT Empresa/ RUT Persona (Opcional para boletas)</label>
                    <input type="text" id="doc-cliente" class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Correo Electrónico</label>
                    <input type="email" id="correo-cliente" placeholder="ejemplo@correo.com" class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none font-medium text-blue-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Teléfono / WhatsApp</label>
                    <input type="tel" id="telefono-cliente" placeholder="+56 9 1234 5678" class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-emerald-700">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Dirección de Despacho / Entrega</label>
                    <input type="text" id="direccion-cliente" placeholder="Ej: Av. Los Leones 1234, Depto 402" class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none font-medium text-slate-700">
                </div>
                <div class="col-span-1 md:col-span-2 flex justify-end gap-3 mt-2 border-t pt-4">
                    <button type="button" id="btn-cancelar-cliente" onclick="cancelarEdicion('cliente')" class="hidden px-6 py-2 border border-slate-300 bg-white text-slate-600 rounded-md font-bold">Cancelar</button>
                    <button type="submit" class="px-8 py-2 bg-blue-600 text-white rounded-md font-bold shadow-sm hover:bg-blue-700 transition-colors">Guardar Cliente</button>
                </div>
            </form>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <ul id="lista-clientes" class="divide-y divide-gray-100"></ul>
            </div>
        </div>

        <div id="seccion-categorias" class="block space-y-4">
            <form id="form-categoria" class="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col md:flex-row items-end gap-4">
                <div class="flex-1 w-full"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre de Categoría</label><input type="text" id="nombre-categoria" required class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                    <button type="button" id="btn-cancelar-categoria" onclick="cancelarEdicion('categoria')" class="hidden flex-1 md:flex-none px-4 py-2 border border-slate-300 text-slate-600 rounded-md font-bold bg-white">Cancelar</button>
                    <button type="submit" class="flex-1 md:flex-none px-6 py-2 bg-slate-800 text-white rounded-md font-bold transition-colors hover:bg-slate-700 shadow-sm h-[40px]">Guardar</button>
                </div>
            </form>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><ul id="lista-categorias" class="divide-y divide-gray-100"></ul></div>
        </div>

        <div id="seccion-unidades" class="hidden space-y-4">
            <form id="form-unidad" class="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col md:flex-row items-end gap-4">
                <div class="flex-1 w-full"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Completo</label><input type="text" id="nombre-unidad" required class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div class="w-full md:w-32"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Abreviatura</label><input type="text" id="abrev-unidad" required class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                    <button type="button" id="btn-cancelar-unidad" onclick="cancelarEdicion('unidad')" class="hidden px-4 py-2 border border-slate-300 text-slate-600 rounded-md font-bold bg-white">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md font-bold transition-colors hover:bg-slate-700 shadow-sm h-[40px]">Guardar</button>
                </div>
            </form>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><ul id="lista-unidades" class="divide-y divide-gray-100"></ul></div>
        </div>

        <div id="seccion-proveedores" class="hidden space-y-4">
            <form id="form-proveedor" class="bg-slate-50 p-6 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Proveedor</label><input type="text" id="nombre-proveedor" required class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Tipo de Proveedor</label><select id="tipo-proveedor" required class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none font-bold"><option value="Externo">Externo</option><option value="Interno">Interno</option></select></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">WhatsApp</label><input type="text" id="whatsapp-proveedor" class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Correo Electrónico</label><input type="email" id="correo-proveedor" class="w-full px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div class="md:col-span-2"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Días Promedio Entrega</label><input type="number" id="tiempo-entrega" class="w-1/2 md:w-1/3 px-4 py-2 border rounded-md bg-white focus:ring-2 focus:ring-emerald-500 outline-none"></div>
                <div class="col-span-1 md:col-span-2 flex justify-end gap-3 mt-2 border-t pt-4"><button type="button" id="btn-cancelar-proveedor" onclick="cancelarEdicion('proveedor')" class="hidden px-6 py-2 border border-slate-300 bg-white text-slate-600 rounded-md font-bold">Cancelar</button><button type="submit" class="px-8 py-2 bg-slate-800 text-white rounded-md font-bold shadow-sm">Guardar Proveedor</button></div>
            </form>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><ul id="lista-proveedores" class="divide-y divide-gray-100"></ul></div>
        </div>

        <div id="seccion-sucursales" class="hidden space-y-4">
            <form id="form-sucursal" class="bg-slate-50 p-6 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Interno</label><input type="text" id="nombre-sucursal" required class="w-full px-4 py-2 border rounded-md bg-white outline-none font-bold"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre Comercial</label><input type="text" id="comercial-sucursal" class="w-full px-4 py-2 border rounded-md bg-white outline-none"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Razón Social Asociada</label><input type="text" id="empresa-sucursal" class="w-full px-4 py-2 border rounded-md bg-white outline-none"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Horarios</label><input type="text" id="horario-sucursal" class="w-full px-4 py-2 border rounded-md bg-white outline-none"></div>
                <div class="col-span-1 md:col-span-2"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Dirección Exacta</label><input type="text" id="dir-sucursal" class="w-full px-4 py-2 border rounded-md bg-white outline-none"></div>
                <div class="col-span-1 md:col-span-2 flex justify-end gap-3 mt-2 border-t pt-4"><button type="button" id="btn-cancelar-sucursal" onclick="cancelarEdicion('sucursal')" class="hidden px-6 py-2 border border-slate-300 bg-white text-slate-600 rounded-md font-bold">Cancelar</button><button type="submit" class="px-8 py-2 bg-slate-800 text-white rounded-md font-bold shadow-sm">Guardar Sucursal</button></div>
            </form>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><ul id="lista-sucursales" class="divide-y divide-gray-100"></ul></div>
        </div>

        <div id="seccion-ubicaciones" class="hidden space-y-4">
            <form id="form-ubicacion" class="bg-slate-50 p-6 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Sucursal Padre</label><select id="sel-sucursal-ubi" required class="w-full px-4 py-2 border rounded-md bg-white outline-none focus:ring-2 focus:ring-emerald-500"></select></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Ubicación Interna</label><input type="text" id="nombre-ubicacion" required class="w-full px-4 py-2 border rounded-md bg-white outline-none focus:ring-2 focus:ring-emerald-500"></div>
                <div class="col-span-1 md:col-span-2 flex justify-end gap-3 mt-2 border-t pt-4">
                    <button type="button" id="btn-cancelar-ubicacion" onclick="cancelarEdicion('ubicacion')" class="hidden px-6 py-2 border border-slate-300 bg-white text-slate-600 rounded-md font-bold">Cancelar</button>
                    <button type="submit" class="px-8 py-2 bg-slate-800 text-white rounded-md font-bold shadow-sm transition-colors">Guardar Ubicación</button>
                </div>
            </form>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><ul id="lista-ubicaciones" class="divide-y divide-gray-100"></ul></div>
        </div>

        <div id="seccion-tipos_movimiento" class="hidden space-y-4">
            <form id="form-tipo-movimiento" class="bg-slate-50 p-6 rounded-xl border border-slate-200 flex flex-col md:flex-row items-end gap-4">
                <div class="flex-1 w-full"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Motivo / Nombre</label><input type="text" id="nombre-tipo-mov" required class="w-full px-4 py-2 border rounded-md bg-white outline-none"></div>
                <div class="w-full md:w-48"><label class="block text-xs font-bold text-slate-500 uppercase mb-1">Impacto en Stock</label><select id="operacion-tipo-mov" required class="w-full px-4 py-2 border rounded-md bg-white outline-none font-bold"><option value="+">Suma (+)</option><option value="-">Resta (-)</option></select></div>
                <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0">
                    <button type="button" id="btn-cancelar-tipo-movimiento" onclick="cancelarEdicion('tipo-movimiento')" class="hidden px-4 py-2 border border-slate-300 bg-white text-slate-600 rounded-md font-bold">Cancelar</button>
                    <button type="submit" class="flex-1 md:flex-none px-6 py-2 bg-slate-800 text-white rounded-md font-bold shadow-sm h-[40px]">Guardar</button>
                </div>
            </form>
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><ul id="lista-tipos-movimiento" class="divide-y divide-gray-100"></ul></div>
        </div>

    </div>
</div>

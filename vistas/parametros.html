<div class="w-full max-w-6xl mx-auto animate-fade-in pb-12">

                    <span>💾</span> Guardar Cambios

            <div class="p-5 md:p-6 space-y-4" id="contenedor-acordeon-permisos">

                            <span class="text-lg">💰</span>
                            <span>Módulo de Ventas y Caja</span>
                            <span class="text-xs font-mono text-slate-400 icono-flecha">+</span>

                        <div class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" value="ventas" class="sr-only peer toggle-maestro" onchange="sincronizarMaestroHijo(this.value)">
                            <div class="w-10 h-5 bg-slate-200 peer peer-checked:bg-emerald-600 rounded-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>

                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Ver Laboratorio y Ranking</span><input type="checkbox" value="ventas_ranking" class="toggle-permiso"></label></li>
                    </ul>
                </div>

                <div class="border border-slate-100 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-slate-50 px-5 py-4 flex items-center justify-between gap-4 border-b border-slate-200">
                        <button class="flex-1 flex items-center gap-3 font-bold text-slate-800 text-left btn-acordeon" data-categoria="inventario">
                            <span class="text-lg">📦</span>
                            <span>Módulo de Inventario</span>
                            <span class="text-xs font-mono text-slate-400 icono-flecha">+</span>

                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Stock Actual</span><input type="checkbox" value="inventario_stock" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Ajustes de Stock Manuales</span><input type="checkbox" value="inventario_ajustes" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Pedidos a Proveedores</span><input type="checkbox" value="inventario_pedidos" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Movimientos de Inventario</span><input type="checkbox" value="inventario_movimientos" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Recetas / Fichas Técnicas</span><input type="checkbox" value="inventario_recetas" class="toggle-permiso"></label></li>
                    </ul>
                </div>

                <div class="border border-slate-100 rounded-lg overflow-hidden shadow-sm">
                    <div class="bg-slate-50 px-5 py-4 flex items-center justify-between gap-4 border-b border-slate-200">
                        <button class="flex-1 flex items-center gap-3 font-bold text-slate-800 text-left btn-acordeon" data-categoria="reportes">
                            <span class="text-lg">📊</span>
                            <span>Reportes Globales</span>
                            <span class="text-xs font-mono text-slate-400 icono-flecha">+</span>
                        </button>
                        <div class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" value="reportes" class="sr-only peer toggle-maestro" onchange="sincronizarMaestroHijo(this.value)">
                            <div class="w-10 h-5 bg-slate-200 peer peer-checked:bg-blue-600 rounded-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        </div>
                    </div>
                    <ul class="divide-y divide-slate-100 hidden bg-white pl-5 pr-5" id="conteo-reportes">
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Valorización de Inventario</span><input type="checkbox" value="reportes_valorizacion" class="toggle-permiso"></label></li>

                    </ul>

                    <div class="bg-slate-50 px-5 py-4 flex items-center justify-between gap-4 border-b border-slate-200">
                        <button class="flex-1 flex items-center gap-3 font-bold text-slate-800 text-left btn-acordeon" data-categoria="catalogos">
                            <span class="text-lg">⚙️</span>
                            <span>Módulo de Catálogos</span>
                            <span class="text-xs font-mono text-slate-400 icono-flecha">+</span>
                        </button>
                        <div class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" value="catalogos" class="sr-only peer toggle-maestro" onchange="sincronizarMaestroHijo(this.value)">
                            <div class="w-10 h-5 bg-slate-200 peer peer-checked:bg-orange-500 rounded-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        </div>
                    </div>
                    <ul class="divide-y divide-slate-100 hidden bg-white pl-5 pr-5" id="conteo-catalogos">
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Productos</span><input type="checkbox" value="catalogos_productos" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Categorías</span><input type="checkbox" value="catalogos_categorias" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Unidades de Medida</span><input type="checkbox" value="catalogos_unidades" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Proveedores</span><input type="checkbox" value="catalogos_proveedores" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Tipos de Movimiento</span><input type="checkbox" value="catalogos_tipos_mov" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Sucursales</span><input type="checkbox" value="catalogos_sucursales" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Ubicaciones Internas</span><input type="checkbox" value="catalogos_ubicaciones" class="toggle-permiso"></label></li>
                        <li class="p-3"><label class="flex items-center justify-between cursor-pointer permiso-label"><span class="text-sm text-slate-700 font-bold">Clientes (POS)</span><input type="checkbox" value="catalogos_clientes" class="toggle-permiso"></label></li>

<div id="modal-nuevo-rol" class="hidden fixed inset-0 bg-slate-900/60 z-[60] flex items-center justify-center backdrop-blur-sm p-4">
    <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border border-slate-200">
        <div class="flex justify-between items-center mb-4 border-b pb-3">
            <h3 class="text-lg font-bold text-slate-800">Crear Nuevo Rol</h3>
            <button onclick="cerrarModalNuevoRol()" class="text-slate-400 hover:text-slate-800 text-2xl font-bold">&times;</button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Nombre del Rol</label>
                <input type="text" id="input-nombre-rol" placeholder="Ej: Cajero, Panadero, Bodeguero..." class="w-full px-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-slate-700">
            </div>
            <button onclick="guardarNuevoRol()" class="w-full py-2.5 bg-emerald-600 text-white rounded-lg font-bold shadow-md hover:bg-emerald-700 transition-colors">
                💾 Guardar Rol Nuevo
            </button>
        </div>
    </div>
</div>

<style>
    .toggle-permiso {
        appearance: none; width: 20px; height: 20px; border: 2px solid #e2e8f0; border-radius: 4px; position: relative; cursor: pointer; transition: background-color 0.15s;
    }
    .toggle-permiso:checked { background-color: #10b981; border-color: #10b981; }
    .toggle-permiso:checked::after { content: '✓'; color: white; position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
    .toggle-permiso:disabled { opacity: 0.5; background-color: #f1f5f9; cursor: not-allowed; }
</style>

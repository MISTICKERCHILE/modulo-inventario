<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <h2 class="text-2xl font-bold text-slate-800">🍔 Catálogo de Productos</h2>
    
    <div class="flex items-center gap-2 flex-wrap">
        <div class="flex bg-white border border-slate-200 rounded-md shadow-sm overflow-hidden">
            <button onclick="document.getElementById('file-importar-productos').click()" title="Importar CSV (Usar plantilla exportada)" class="px-3 py-2 text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 transition-colors border-r">
                📥
            </button>
            <input type="file" id="file-importar-productos" accept=".csv" class="hidden" onchange="importarProductosCSV(this)">
            
            <button onclick="exportarProductosCSV()" title="Exportar a Excel / Descargar Plantilla" class="px-3 py-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition-colors border-r">
                📤
            </button>
            
            <button onclick="imprimirCatalogoProductos()" title="Imprimir Catálogo PDF" class="px-3 py-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-colors">
                🖨️
            </button>
        </div>
        
        <button onclick="abrirModalProducto()" class="px-4 py-2 bg-emerald-600 text-white rounded-md font-medium shadow-sm hover:bg-emerald-700 transition-colors">+ Nuevo Producto</button>
    </div>
</div>

<div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
    
    <div class="w-full md:w-1/3 relative">
        <span class="absolute left-3 top-2 text-slate-400">🔍</span>
        <input type="text" id="buscador-texto-prod" oninput="buscarProductoCatalogo(this.value)" placeholder="Buscar por nombre..." class="w-full pl-9 pr-3 py-1.5 border border-slate-300 rounded-md text-sm font-medium focus:ring-2 focus:ring-emerald-500 outline-none bg-slate-50">
    </div>

    <div class="flex flex-col md:flex-row items-center gap-3 w-full md:w-auto">
        <select id="filtro-cat-prod" onchange="cambiarFiltroCatProd(this.value)" class="border border-slate-300 rounded-md px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-emerald-500 outline-none w-full md:w-48 bg-slate-50 cursor-pointer">
            <option value="TODOS">Todas las Categorías</option>
        </select>
        <select id="orden-prod" onchange="cambiarOrdenProd(this.value)" class="border border-slate-300 rounded-md px-3 py-1.5 text-sm font-medium focus:ring-2 focus:ring-emerald-500 outline-none w-full md:w-48 bg-slate-50 cursor-pointer">
            <option value="A-Z">A-Z (Alfabético)</option>
            <option value="NUEVOS">Más Nuevos Primero</option>
            <option value="VIEJOS">Más Antiguos Primero</option>
        </select>
    </div>
    
    <div class="flex items-center gap-2 w-full md:w-auto justify-end">
        <span class="text-sm font-bold text-slate-500">Mostrar:</span>
        <select id="pag-size-prod" onchange="cambiarPageSizeProd(this.value)" class="border border-slate-300 rounded-md px-3 py-1.5 text-sm font-bold text-emerald-700 bg-emerald-50 focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
        </select>
    </div>
</div>

<div class="bg-white rounded-xl shadow-sm border overflow-x-auto w-full">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-slate-50">
            <tr>
                <th onclick="ordenarTablaProd('nombre')" class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors group select-none">
                    Nombre del Producto <span class="text-slate-300 group-hover:text-emerald-500 ml-1">↕</span>
                </th>
                <th onclick="ordenarTablaProd('control_stock')" class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors group select-none">
                    Control Físico <span class="text-slate-300 group-hover:text-emerald-500 ml-1">↕</span>
                </th>
                <th onclick="ordenarTablaProd('tiene_receta')" class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors group select-none">
                    Receta Asignada <span class="text-slate-300 group-hover:text-emerald-500 ml-1">↕</span>
                </th>
                <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider no-print">Acciones</th>
            </tr>
        </thead>
        <tbody id="lista-productos" class="divide-y divide-gray-200 bg-white">
        </tbody>
    </table>
</div>

<div class="flex justify-between items-center mt-4 px-2 mb-8">
    <p class="text-sm text-slate-500 font-medium" id="prod-pag-info">Mostrando 0 a 0 de 0</p>
    <div class="flex gap-2">
        <button onclick="cambiarPaginaProd(-1)" id="btn-prod-prev" class="px-4 py-2 bg-white border border-slate-300 shadow-sm rounded-md text-slate-600 hover:bg-slate-50 font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Anterior</button>
        <button onclick="cambiarPaginaProd(1)" id="btn-prod-next" class="px-4 py-2 bg-white border border-slate-300 shadow-sm rounded-md text-slate-600 hover:bg-slate-50 font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Siguiente</button>
    </div>
</div>

<style>
    @media print {
        #sidebar-menu, header, button, .no-print, .flex.flex-col.md\\:flex-row.justify-between.items-center.mb-4 { display: none !important; }
        #main-content { padding: 0 !important; width: 100% !important; }
        body { background-color: white !important; }
        .shadow-sm, .shadow-md { box-shadow: none !important; border: 1px solid #ccc; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
</style>

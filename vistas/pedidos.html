<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">🛒 Gestión de Pedidos y Recepciones</h2>
    
    <div class="flex items-center bg-white border border-slate-200 rounded-md shadow-sm overflow-hidden">
        <button onclick="exportarMovimientosCSV()" title="Exportar TODO el Historial de Movimientos a Excel" class="px-3 py-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition-colors border-r">

        <button onclick="window.print()" title="Imprimir / PDF" class="px-3 py-2 text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-colors">

        </button>
    </div>
</div>

<div class="flex border-b border-gray-200 mb-6 overflow-x-auto bg-white rounded-t-lg shadow-sm">
    <button onclick="cambiarSubTabPedidos('sugerencias')" id="subtab-sugerencias" class="px-6 py-3 font-medium border-b-2 border-emerald-600 text-emerald-600 bg-emerald-50/50 whitespace-nowrap">Sugerencias por Stock</button>
    <button onclick="cambiarSubTabPedidos('transito')" id="subtab-transito" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">Pedidos en Tránsito</button>
    <button onclick="cambiarSubTabPedidos('produccion')" id="subtab-produccion" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">Órdenes de Producción</button>
</div>

    <div id="lista-alertas-compras" class="space-y-6"></div>

        <div id="lista-carritos-proveedor" class="space-y-6"></div>

</div>

<div id="subvista-transito" class="hidden space-y-6">

        <h3 class="text-xl font-bold mb-6 text-slate-800" id="transito-titulo-seccion">🚚 Selecciona tu Sucursal</h3>
        <div id="grid-sucursales-transito" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>
    <div id="transito-vista-detalle" class="hidden">
        <button onclick="volverGridTransito()" class="text-slate-500 font-bold mb-4 flex items-center gap-1 hover:text-slate-800 text-sm transition-colors">← Cambiar Sucursal</button>

<div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">🛒 Gestión de Pedidos y Recepciones</h2>
</div>

<div class="flex border-b border-gray-200 mb-6 overflow-x-auto bg-white rounded-t-lg shadow-sm">
    <button onclick="cambiarSubTabPedidos('sugerencias')" id="subtab-sugerencias" class="px-6 py-3 font-medium border-b-2 border-emerald-600 text-emerald-600 bg-emerald-50/50 whitespace-nowrap">Sugerencias de Pedidos</button>
    <button onclick="cambiarSubTabPedidos('transito')" id="subtab-transito" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">Pedidos en Tránsito</button>
    <button onclick="cambiarSubTabPedidos('produccion')" id="subtab-produccion" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors whitespace-nowrap">Órdenes de Producción</button>
</div>

<div id="subvista-sugerencias" class="block space-y-6">
    
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4 justify-between items-center">
        <div class="relative w-full md:w-1/2">
            <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
            <input type="text" id="search-sugerencias" oninput="filtrarSugerencias()" placeholder="Buscar producto, categoría o referencia..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50 focus:bg-white transition-colors font-medium">
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
            <label class="text-xs font-bold text-slate-500 uppercase">Ordenar por:</label>
            <select id="sort-sugerencias" onchange="filtrarSugerencias()" class="px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 bg-white font-bold text-sm text-slate-700">
                <option value="urgencia">🔥 Mayor Urgencia (Stock Bajo)</option>
                <option value="nombre">🔤 Alfabético (A-Z)</option>
                <option value="mayor_sugerido">📦 Mayor Cant. Sugerida</option>
                <option value="precio">💰 Precio de Referencia</option>
            </select>
        </div>
    </div>

    <div id="lista-alertas-compras" class="space-y-4"></div>
    
    <div id="contenedor-bandeja" class="hidden mt-8 border-t-2 border-dashed border-slate-300 pt-8">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h3 class="text-2xl font-black text-slate-800 flex items-center gap-2"><span>☁️</span> Bandeja de Pedidos (Colaborativa)</h3>
                <p class="text-sm text-slate-500 mt-1">Este carrito está en la nube. Tu equipo puede verlo y editarlo en tiempo real.</p>
            </div>
            <button onclick="cargarPedidosPlanificados()" class="text-sm text-blue-600 hover:text-blue-800 font-bold bg-blue-50 px-3 py-1.5 rounded-md border border-blue-200 shadow-sm transition-colors flex items-center gap-1">🔄 Sincronizar Nube</button>
        </div>
        <div id="lista-carritos-proveedor" class="space-y-6"></div>
    </div>
</div>

<div id="subvista-transito" class="hidden space-y-6">
    <div id="transito-vista-sucursales" class="block">
        <h3 class="text-xl font-bold mb-6 text-slate-800" id="transito-titulo-seccion">🚚 Selecciona tu Sucursal</h3>
        <div id="grid-sucursales-transito" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </div>
    <div id="transito-vista-detalle" class="hidden">
        <button onclick="volverGridTransito()" class="text-slate-500 font-bold mb-4 flex items-center gap-1 hover:text-slate-800 text-sm transition-colors">← Cambiar Sucursal</button>
        <h3 class="text-2xl font-bold mb-6 text-slate-800" id="transito-titulo-sucursal">🚚 En Camino a: -</h3>
        <div id="lista-transito-proveedores" class="space-y-6"></div>
    </div>
</div>

<style>
    @media print {
        #sidebar-menu, header, button { display: none !important; }
        #main-content { padding: 0 !important; width: 100% !important; }
        body { background-color: white !important; }
        .shadow-sm, .shadow-md { box-shadow: none !important; border: 1px solid #ccc; }
    }
</style>

<div class="mb-8 bg-gradient-to-r from-emerald-600 to-teal-500 rounded-2xl p-8 text-white shadow-md">
    <h2 id="dash-saludo" class="text-3xl md:text-4xl font-bold mb-2">¡Hola!</h2>
    <p class="text-emerald-50 text-lg opacity-90">Aquí tienes el resumen en tiempo real de tu operación.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <div onclick="irAAlertasStock()" class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm hover:shadow-md hover:border-red-300 transition-all cursor-pointer group relative overflow-hidden">
        <div class="absolute top-0 right-0 w-16 h-16 bg-red-50 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-150"></div>
        <div class="flex justify-between items-start mb-4 relative z-10"><div class="p-3 bg-red-100 text-red-600 rounded-lg"><span class="text-2xl">⚠️</span></div><span class="text-4xl font-black text-slate-800" id="widget-alertas-num">0</span></div>
        <h3 class="font-bold text-slate-700 text-lg mb-1 relative z-10">Alertas de Stock</h3>
        <p class="text-sm text-slate-500 relative z-10">Productos bajo el mínimo sugerido</p>
    </div>
    <div onclick="irATransito()" class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group relative overflow-hidden">
        <div class="absolute top-0 right-0 w-16 h-16 bg-blue-50 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-150"></div>
        <div class="flex justify-between items-start mb-4 relative z-10"><div class="p-3 bg-blue-100 text-blue-600 rounded-lg"><span class="text-2xl">🚚</span></div><span class="text-4xl font-black text-slate-800" id="widget-transito-num">0</span></div>
        <h3 class="font-bold text-slate-700 text-lg mb-1 relative z-10">En Tránsito</h3>
        <p class="text-sm text-slate-500 relative z-10">Camiones y entregas pendientes</p>
    </div>
    <div onclick="irASubirVentas()" class="bg-white rounded-xl p-6 border border-slate-200 shadow-sm hover:shadow-md hover:border-purple-300 transition-all cursor-pointer group relative overflow-hidden">
        <div class="absolute top-0 right-0 w-16 h-16 bg-purple-50 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-150"></div>
        <div class="flex justify-between items-start mb-4 relative z-10"><div class="p-3 bg-purple-100 text-purple-600 rounded-lg"><span class="text-2xl">📊</span></div><span class="text-4xl font-black text-slate-800" id="widget-pos-num">-</span></div>
        <h3 class="font-bold text-slate-700 text-lg mb-1 relative z-10">Último Ingreso POS</h3>
        <p class="text-sm text-slate-500 relative z-10">Días sin actualizar ventas</p>
    </div>
</div>

<h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2"><span>⚡</span> Accesos Rápidos</h3>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
    <button onclick="irASubirVentas()" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-400 hover:bg-emerald-50 transition-all flex flex-col items-center justify-center gap-2 group">
        <span class="text-3xl group-hover:scale-110 transition-transform">📊</span>
        <span class="font-bold text-slate-700 text-sm text-center">Ingresar Ventas</span>
    </button>
    <button onclick="irAComprasDirectas()" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-emerald-400 hover:bg-emerald-50 transition-all flex flex-col items-center justify-center gap-2 group">
        <span class="text-3xl group-hover:scale-110 transition-transform">🛒</span>
        <span class="font-bold text-slate-700 text-sm text-center">Ingresar Compra</span>
    </button>
    <button onclick="irARecepcionPedidos()" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-400 hover:bg-blue-50 transition-all flex flex-col items-center justify-center gap-2 group">
        <span class="text-3xl group-hover:scale-110 transition-transform">📦</span>
        <span class="font-bold text-slate-700 text-sm text-center">Recepcionar Pedidos</span>
    </button>
    <button onclick="irAOrdenesProduccion()" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-purple-400 hover:bg-purple-50 transition-all flex flex-col items-center justify-center gap-2 group">
        <span class="text-3xl group-hover:scale-110 transition-transform">🏭</span>
        <span class="font-bold text-slate-700 text-sm text-center">Órdenes Producción</span>
    </button>
    <button onclick="irAOtrosMovimientos()" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-orange-400 hover:bg-orange-50 transition-all flex flex-col items-center justify-center gap-2 group">
        <span class="text-3xl group-hover:scale-110 transition-transform">🔄</span>
        <span class="font-bold text-slate-700 text-sm text-center">Otros Movimientos</span>
    </button>
    <button onclick="cambiarVista('reportes')" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-slate-400 hover:bg-slate-100 transition-all flex flex-col items-center justify-center gap-2 group">
        <span class="text-3xl group-hover:scale-110 transition-transform">📈</span>
        <span class="font-bold text-slate-700 text-sm text-center">Reportes</span>
    </button>
</div>

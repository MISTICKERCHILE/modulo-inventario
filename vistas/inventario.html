<div id="inv-vista-sucursales" class="block">
    <h2 class="text-2xl font-bold mb-6 text-slate-800">📦 Selecciona una Sucursal para ver su Inventario</h2>
    <div id="grid-sucursales-inventario" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
</div>

<div id="inv-vista-detalle" class="hidden">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <button onclick="volverGridInventario()" class="text-emerald-600 font-bold mb-1 flex items-center gap-1 hover:underline text-sm transition-colors">← Volver al inicio</button>
            <h2 class="text-2xl font-bold text-slate-800" id="inv-titulo-sucursal">📦 Inventario: -</h2>
            <p class="text-slate-500 text-sm mt-1">Control de saldos agrupados por ubicación interna.</p>
        </div>
        <div class="flex gap-2">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">🔍</span>
                <input type="text" id="busqueda-inventario" oninput="filtrarInventarioLocal(this.value)" placeholder="Buscar producto..." class="pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none shadow-sm w-64 transition-all">
            </div>
            <button onclick="abrirModalConteoMasivo()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-sm hover:bg-emerald-700 transition-transform hover:scale-105 flex items-center gap-2">🎯 Toma de Inventario</button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-x-auto w-full pb-32">
        <table class="min-w-full divide-y divide-gray-200 overflow-visible">
            <thead class="bg-slate-50">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase cursor-pointer hover:bg-slate-100 transition-colors" onclick="ordenarInventario('estado')">Estado ↕️</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase cursor-pointer hover:bg-slate-100 transition-colors" onclick="ordenarInventario('ubicacion')">Ubicación Interna ↕️</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase cursor-pointer hover:bg-slate-100 transition-colors" onclick="ordenarInventario('nombre')">Producto ↕️</th>
                    <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase cursor-pointer hover:bg-slate-100 transition-colors" onclick="ordenarInventario('stock')">Stock Actual ↕️</th>
                    <th class="px-6 py-4 text-center text-xs font-bold text-gray-500 uppercase w-48">Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-inventario" class="divide-y divide-gray-200 bg-white"></tbody>
        </table>
    </div>
</div>

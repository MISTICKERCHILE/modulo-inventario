<div class="bg-emerald-700 text-white p-6 rounded-t-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div class="w-full md:w-1/3">
        
        <div class="flex justify-between items-center mb-3">
            <h2 class="text-2xl font-bold" id="receta-titulo">Gestión de Recetas</h2>
            <div id="btn-imprimir-receta" class="hidden flex gap-2">
                <button onclick="imprimirReceta('cocina')" class="bg-white text-emerald-800 text-xs px-3 py-1.5 rounded font-bold hover:bg-emerald-50 transition-colors shadow-sm" title="Imprimir formato para Producción">🖨️ Cocina</button>
                <button onclick="imprimirReceta('admin')" class="bg-white text-emerald-800 text-xs px-3 py-1.5 rounded font-bold hover:bg-emerald-50 transition-colors shadow-sm" title="Imprimir formato con Costos">🖨️ Admin</button>
            </div>
        </div>
        
        <select id="buscador-recetas" onchange="seleccionarRecetaDesdeBuscador(this.value)" class="w-full px-3 py-2 text-slate-800 rounded-md font-medium outline-none shadow-sm cursor-pointer"></select>
        <p class="text-emerald-200 text-sm mt-2 hidden" id="receta-unidad-base">Unidad base: -</p>
    </div>
    
    <div id="panel-estadisticas-receta" class="hidden bg-emerald-800 p-4 rounded-lg flex gap-6 items-center border border-emerald-600 overflow-x-auto w-full md:w-auto">
        <div class="shrink-0">
            <label class="block text-xs text-emerald-300 font-bold mb-1 uppercase tracking-wide">Rendimiento Real</label>
            <div class="flex items-center gap-2">
                <input type="number" step="0.01" id="receta-rendimiento" class="w-20 px-2 py-1 text-slate-800 rounded font-bold text-center outline-none focus:ring-2 focus:ring-emerald-500 shadow-inner">
                <span id="receta-label-rendimiento" class="text-sm font-bold"></span>
                <button onclick="guardarRendimiento()" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 font-bold rounded transition-colors shadow-sm">Guardar</button>
            </div>
        </div>
        <div class="border-l border-emerald-600 pl-6 shrink-0">
            <p class="text-xs text-emerald-300 font-bold mb-1 uppercase tracking-wide">Costo Unit. (Neto)</p>
            <p class="text-xl font-bold" id="receta-costo-unitario">$0.00</p>
        </div>
        <div class="border-l border-emerald-600 pl-6 shrink-0">
            <p class="text-xs text-emerald-300 font-bold mb-1 uppercase tracking-wide">Costo Unit. (+19% IVA)</p>
            <p class="text-2xl font-black text-white" id="receta-costo-iva">$0.00</p>
        </div>
    </div>
</div>

<div id="msj-receta-vacia" class="bg-white p-16 border-x border-b rounded-b-xl shadow-sm text-center text-slate-400">
    <span class="text-5xl mb-4 block">📝</span>
    <p class="text-lg font-medium">Selecciona una receta en el buscador superior para armar su composición.</p>
</div>

<div id="panel-receta-activa" class="hidden bg-white p-6 border-x border-b rounded-b-xl shadow-sm">
    <form id="form-ingrediente" class="flex flex-col md:flex-row gap-4 items-end mb-6 bg-slate-50 p-4 border border-slate-200 rounded-lg">
        
        <div class="flex-1 w-full relative dropdown-container" id="contenedor-dropdown-receta">
            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Buscar Insumo / Ingrediente</label>
            <input type="hidden" id="hidden-ingrediente" required>
            <div class="relative">
                <span class="absolute left-3 top-2.5 text-slate-400 text-sm">🔍</span>
                <input type="text" id="search-ingrediente" class="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-md bg-white outline-none focus:ring-2 focus:ring-emerald-500 font-medium cursor-pointer" placeholder="-- Escribe para buscar insumo --" onfocus="abrirDropdownIngrediente()" oninput="filtrarDropdownIngrediente(this.value)" autocomplete="off">
                <div id="dropdown-ingrediente" class="lista-dropdown-custom hidden absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded shadow-xl max-h-48 overflow-y-auto">
                    <ul id="ul-ingrediente" class="py-1 text-sm text-slate-700 divide-y divide-slate-100"></ul>
                </div>
            </div>
        </div>

        <div class="w-full md:w-32 relative shrink-0">
            <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Cantidad</label>
            <input type="number" step="0.0001" id="ing-cantidad" required class="w-full px-3 py-2 border border-slate-300 rounded-md pr-10 outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-center shadow-inner">
            <span id="label-unidad-ingrediente" class="absolute right-3 top-8 text-xs font-bold text-emerald-600"></span>
        </div>
        
        <div class="flex gap-2 w-full md:w-auto shrink-0">
            <button type="button" id="btn-cancelar-ingrediente" onclick="resetearFormularioIngrediente()" class="hidden w-full md:w-auto px-4 py-2 border text-gray-600 rounded-md font-bold hover:bg-slate-100">Cancelar</button>
            <button type="submit" class="w-full md:w-auto px-6 py-2 bg-emerald-600 text-white rounded-md font-bold transition-colors hover:bg-emerald-700 shadow-sm h-[40px]">Añadir a la Receta</button>
        </div>
    </form>

    <div class="overflow-x-auto border rounded-lg shadow-inner">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-100">
                <tr>
                    <th class="py-3 px-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Ingrediente</th>
                    <th class="py-3 px-4 text-center text-xs font-bold text-slate-500 uppercase tracking-wider w-32">Cant. Usada</th>
                    <th class="py-3 px-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider w-32">Costo Línea</th>
                    <th class="py-3 px-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider w-24">Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-ingredientes-receta" class="divide-y divide-slate-100 bg-white"></tbody>
        </table>
    </div>
</div>

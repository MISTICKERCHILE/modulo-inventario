<div id="pos-wrapper" class="fixed inset-0 z-50 bg-slate-50 hidden flex-col">
    
    <div id="pos-pin-screen" class="flex-1 flex flex-col items-center justify-center bg-slate-900 text-white p-4">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-emerald-400 mb-2">Simple POS</h2>
            <p class="text-slate-400">Ingresa tu PIN de operador</p>
        </div>
        
        <div class="flex gap-4 mb-8">
            <div class="w-4 h-4 rounded-full bg-slate-700 pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full bg-slate-700 pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full bg-slate-700 pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full bg-slate-700 pin-dot transition-colors"></div>
        </div>

        <div class="grid grid-cols-3 gap-4 max-w-[280px] w-full">
            <button onclick="teclearPin(1)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">1</button>
            <button onclick="teclearPin(2)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">2</button>
            <button onclick="teclearPin(3)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">3</button>
            <button onclick="teclearPin(4)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">4</button>
            <button onclick="teclearPin(5)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">5</button>
            <button onclick="teclearPin(6)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">6</button>
            <button onclick="teclearPin(7)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">7</button>
            <button onclick="teclearPin(8)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">8</button>
            <button onclick="teclearPin(9)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">9</button>
            <button onclick="salirDePOS()" class="h-16 text-slate-400 rounded-2xl text-sm font-bold hover:bg-slate-800 transition-colors">CERRAR</button>
            <button onclick="teclearPin(0)" class="h-16 bg-slate-800 rounded-2xl text-2xl font-bold hover:bg-slate-700 transition-colors">0</button>
            <button onclick="borrarPin()" class="h-16 text-red-400 rounded-2xl text-2xl font-bold hover:bg-slate-800 transition-colors">⌫</button>
        </div>
    </div>

    <div id="pos-dashboard-screen" class="hidden flex-1 flex-col bg-slate-50">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm shrink-0">
            <div class="flex items-center gap-2">
                <span class="text-2xl text-emerald-600">⚡</span>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">Simple <span class="text-emerald-600">POS</span></h1>
            </div>
            
            <div class="text-sm font-bold text-slate-500 uppercase tracking-widest" id="pos-fecha-actual">
                --/--/----
            </div>

            <div class="flex items-center gap-4 relative">
                <span class="text-sm font-bold text-slate-700 bg-slate-100 px-4 py-2 rounded-full border border-slate-200" id="pos-nombre-cajero">Cajero</span>
                
                <button onclick="togglePosMenu()" class="text-slate-500 hover:bg-slate-200 px-2 py-1 rounded-md text-2xl font-bold transition-colors outline-none">⋮</button>
                <div id="pos-dropdown-menu" class="hidden absolute right-0 top-12 mt-2 w-56 bg-white rounded-xl shadow-2xl border border-slate-200 z-50 overflow-hidden">
                    <button class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 font-bold border-b border-slate-100">⚙️ Configurar Menú</button>
                    <button class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 font-bold border-b border-slate-100">👥 Configurar Usuarios</button>
                    <button class="w-full text-left px-4 py-3 text-sm text-slate-700 hover:bg-slate-50 font-bold border-b border-slate-100">📊 Ver Resumen Ventas</button>
                    <button onclick="cerrarTurno()" class="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50 font-black uppercase">🔒 Cierre Ventas Diarias</button>
                </div>
            </div>
        </header>

        <div class="flex-1 flex items-center justify-center p-6">
            <div class="w-full max-w-md space-y-4">
                <button onclick="iniciarNuevaVenta()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white rounded-3xl p-8 flex justify-between items-center shadow-lg transform transition-transform hover:scale-105 group border-b-4 border-emerald-800">
                    <div class="text-left">
                        <h2 class="text-4xl font-black uppercase">Nueva<br>Venta</h2>
                    </div>
                    <span class="text-6xl font-black opacity-50 group-hover:opacity-100 transition-opacity">+</span>
                </button>

                <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white rounded-3xl p-8 flex justify-between items-center shadow-lg transform transition-transform hover:scale-105 group border-b-4 border-indigo-800">
                    <div class="text-left">
                        <h2 class="text-3xl font-black uppercase tracking-tight">Cuentas<br>Guardadas</h2>
                    </div>
                    <span class="text-5xl">📝</span>
                </button>

                <button class="w-full bg-amber-600 hover:bg-amber-500 text-white rounded-3xl p-8 flex justify-between items-center shadow-lg transform transition-transform hover:scale-105 group border-b-4 border-amber-800">
                    <div class="text-left">
                        <h2 class="text-3xl font-black uppercase">Clientes</h2>
                    </div>
                    <span class="text-5xl">👤</span>
                </button>
            </div>
        </div>
    </div>
</div>

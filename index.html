<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div id="login-container" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6"><div class="text-4xl mb-4">📦</div><h1 class="text-2xl font-bold">Módulo - Inventario</h1></div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo" required class="w-full px-3 py-2 border rounded-md">
                <input type="password" id="password" placeholder="Contraseña" required class="w-full px-3 py-2 border rounded-md">
                <button type="submit" class="w-full py-2 bg-emerald-600 text-white rounded-md font-medium">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2"><span class="text-2xl">📦</span><h1 class="text-xl font-bold">Inventario Pro</h1></div>
            <button onclick="cerrarSesion()" class="text-sm text-red-600 hover:text-red-800 font-medium">Cerrar Sesión</button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 bg-slate-800 text-white flex flex-col p-4 space-y-2">
                <button onclick="cambiarVista('catalogos')" id="btn-menu-catalogos" class="w-full flex items-center gap-3 px-4 py-3 bg-emerald-600 rounded-lg font-medium transition-colors"><span>🏷️</span> Catálogos</button>
                <button onclick="cambiarVista('productos')" id="btn-menu-productos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🍔</span> Productos</button>
            </aside>

            <main class="flex-1 p-8 overflow-y-auto">
                
                <div id="vista-catalogos" class="max-w-4xl mx-auto block">
                    <h2 class="text-2xl font-bold mb-6 text-slate-700">Gestión de Catálogos</h2>
                    <div class="flex border-b border-gray-200 mb-6 overflow-x-auto">
                        <button onclick="cambiarTab('categorias')" id="tab-categorias" class="px-6 py-3 font-medium whitespace-nowrap">Categorías</button>
                        <button onclick="cambiarTab('unidades')" id="tab-unidades" class="px-6 py-3 font-medium whitespace-nowrap text-gray-500">Unidades</button>
                        <button onclick="cambiarTab('proveedores')" id="tab-proveedores" class="px-6 py-3 font-medium whitespace-nowrap text-gray-500">Proveedores</button>
                        <button onclick="cambiarTab('locaciones')" id="tab-locaciones" class="px-6 py-3 font-medium whitespace-nowrap text-gray-500">Sedes (Sucursales)</button>
                        <button onclick="cambiarTab('ubicaciones')" id="tab-ubicaciones" class="px-6 py-3 font-medium whitespace-nowrap text-gray-500">Ubicaciones Internas</button>
                    </div>

                    <div id="seccion-categorias" class="block">
                        <form id="form-categoria" class="bg-white p-6 rounded-xl shadow-sm border mb-6 flex gap-4">
                            <input type="text" id="nombre-categoria" placeholder="Ej: Carnes" required class="flex-1 px-4 py-2 border rounded-md">
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-categorias" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-unidades" class="hidden">
                        <form id="form-unidad" class="bg-white p-6 rounded-xl shadow-sm border mb-6 flex gap-4">
                            <input type="text" id="nombre-unidad" placeholder="Ej: Caja" required class="flex-1 px-4 py-2 border rounded-md">
                            <input type="text" id="abrev-unidad" placeholder="Abrev" required class="w-24 px-4 py-2 border rounded-md">
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-unidades" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-proveedores" class="hidden">
                        <form id="form-proveedor" class="bg-white p-6 rounded-xl shadow-sm border mb-6 grid grid-cols-2 gap-4">
                            <input type="text" id="nombre-proveedor" placeholder="Empresa" required class="col-span-2 px-4 py-2 border rounded-md">
                            <input type="text" id="contacto-proveedor" placeholder="Contacto" class="px-4 py-2 border rounded-md">
                            <input type="number" id="tiempo-entrega" placeholder="Días entrega" class="px-4 py-2 border rounded-md">
                            <button type="submit" class="col-span-2 px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-proveedores" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-locaciones" class="hidden">
                        <form id="form-locacion" class="bg-white p-6 rounded-xl shadow-sm border mb-6 flex gap-4">
                            <input type="text" id="nombre-locacion" placeholder="Nombre (Tienda Centro)" required class="flex-1 px-4 py-2 border rounded-md">
                            <input type="text" id="dir-locacion" placeholder="Dirección" class="flex-1 px-4 py-2 border rounded-md">
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-locaciones" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-ubicaciones" class="hidden">
                        <form id="form-ubicacion" class="bg-white p-6 rounded-xl shadow-sm border mb-6 grid grid-cols-2 gap-4">
                            <select id="sel-locacion" required class="px-4 py-2 border rounded-md bg-white"></select>
                            <input type="text" id="nombre-ubicacion" placeholder="Ubicación Interna (Estante 1)" required class="px-4 py-2 border rounded-md">
                            <button type="submit" class="col-span-2 px-6 py-2 bg-slate-800 text-white rounded-md">Guardar Ubicación</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-ubicaciones" class="divide-y divide-gray-200"></ul></div>
                    </div>
                </div>

                <div id="vista-productos" class="max-w-6xl mx-auto hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Catálogo de Productos</h2>
                        <button onclick="mostrarFormProducto()" class="px-4 py-2 bg-emerald-600 text-white rounded-md">+ Nuevo Producto</button>
                    </div>
                    <div id="panel-form-producto" class="bg-white p-8 rounded-xl shadow-lg border mb-8 hidden">
                        </div>
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-slate-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">SKU</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">U. Compra</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">U. Receta</th></tr></thead>
                            <tbody id="lista-productos" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

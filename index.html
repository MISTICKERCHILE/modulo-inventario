<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm text-center border border-gray-100">
        <div class="text-4xl mb-4">📦</div>
        <h1 class="text-2xl font-bold mb-2 text-slate-800">Inventario Pro</h1>
        <p class="text-slate-500 text-sm mb-6">Sistema de gestión multi-empresa</p>
        
        <div class="p-4 bg-slate-50 rounded-lg border border-slate-100">
            <p id="estado" class="text-slate-600 text-sm font-medium">Conectando a Supabase...</p>
            <div id="indicador" class="mt-3 h-2 w-full bg-yellow-400 rounded-full animate-pulse"></div>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANTE: Tus datos de Supabase (Correctos)
    const supabaseUrl = 'https://gdtrkrnxkhiqimvmfrms.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdHJrcm54a2hpcWltdm1mcm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjYyODcsImV4cCI6MjA4ODA0MjI4N30.IYJR0fsehO0nXZ5YdEQ53S7Q1Z0e8qYSWdDeQkcTDS0';
    
    // CORRECCIÓN: Le cambiamos el nombre a "clienteSupabase" para que no choque
    const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function probarConexion() {
        try {
            // Usamos "clienteSupabase" en lugar de "supabase"
            const { data, error } = await clienteSupabase.from('empresas').select('*');
            
            const estadoText = document.getElementById("estado");
            const indicador = document.getElementById("indicador");

            if (error) {
                console.error("Error:", error);
                estadoText.innerText = "❌ Error de conexión";
                estadoText.className = "text-red-600 text-sm font-bold";
                indicador.className = "mt-3 h-2 w-full bg-red-500 rounded-full";
            } else {
                console.log("Conectado. Datos:", data);
                estadoText.innerText = "✅ ¡Base de datos conectada!";
                estadoText.className = "text-emerald-600 text-sm font-bold";
                indicador.className = "mt-3 h-2 w-full bg-emerald-500 rounded-full";
                indicador.classList.remove("animate-pulse");
            }
        } catch (err) {
            console.error("Fallo general:", err);
        }
    }

    // Iniciamos la prueba
    probarConexion();
    </script>
</body>
</html>

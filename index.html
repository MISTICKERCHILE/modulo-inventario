<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div id="login-container" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6">
                <div class="text-4xl mb-4">📦</div>
                <h1 class="text-2xl font-bold">Módulo - Inventario</h1>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo" required class="w-full px-3 py-2 border rounded-md">
                <input type="password" id="password" placeholder="Contraseña" required class="w-full px-3 py-2 border rounded-md">
                <button type="submit" class="w-full py-2 bg-emerald-600 text-white rounded-md font-medium">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2"><span class="text-2xl">📦</span><h1 class="text-xl font-bold">Inventario Pro</h1></div>
            <button onclick="cerrarSesion()" class="text-sm text-red-600 hover:text-red-800 font-medium">Cerrar Sesión</button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 bg-slate-800 text-white flex flex-col p-4 space-y-2">
                <button onclick="cambiarVista('catalogos')" id="btn-menu-catalogos" class="w-full flex items-center gap-3 px-4 py-3 bg-emerald-600 rounded-lg font-medium"><span>🏷️</span> Catálogos</button>
                <button onclick="cambiarVista('productos')" id="btn-menu-productos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🍔</span> Productos</button>
            </aside>

            <main class="flex-1 p-8 overflow-y-auto">
                
                <div id="vista-catalogos" class="max-w-4xl mx-auto block">
                    <h2 class="text-2xl font-bold mb-6">Gestión de Catálogos Básicos</h2>
                    <div class="flex border-b border-gray-200 mb-6">
                        <button onclick="cambiarTab('categorias')" id="tab-categorias" class="px-6 py-3 font-medium text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50/50">Categorías</button>
                        <button onclick="cambiarTab('unidades')" id="tab-unidades" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700">Unidades</button>
                    </div>

                    <div id="seccion-categorias" class="block">
                        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                            <form id="form-categoria" class="flex gap-4">
                                <input type="text" id="nombre-categoria" placeholder="Nueva Categoría (Ej: Carnes)" required class="flex-1 px-4 py-2 border rounded-md">
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                            </form>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-categorias" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-unidades" class="hidden">
                        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                            <form id="form-unidad" class="flex gap-4">
                                <input type="text" id="nombre-unidad" placeholder="Nombre (Ej: Caja)" required class="flex-1 px-4 py-2 border rounded-md">
                                <input type="text" id="abrev-unidad" placeholder="Abrev (Ej: CJ)" required class="w-32 px-4 py-2 border rounded-md">
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                            </form>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-unidades" class="divide-y divide-gray-200"></ul></div>
                    </div>
                </div>

                <div id="vista-productos" class="max-w-6xl mx-auto hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Catálogo de Productos</h2>
                        <button onclick="mostrarFormProducto()" class="px-4 py-2 bg-emerald-600 text-white rounded-md font-medium hover:bg-emerald-700">+ Nuevo Producto</button>
                    </div>

                    <div id="panel-form-producto" class="bg-white p-8 rounded-xl shadow-lg border border-gray-200 mb-8 hidden">
                        <h3 class="text-xl font-bold mb-4 text-emerald-700 border-b pb-2">Crear Nuevo Producto</h3>
                        <form id="form-producto" class="space-y-6">
                            
                            <div class="grid grid-cols-3 gap-6">
                                <div><label class="block text-sm font-medium mb-1">Nombre</label><input type="text" id="prod-nombre" required class="w-full px-3 py-2 border rounded-md"></div>
                                <div><label class="block text-sm font-medium mb-1">SKU</label><input type="text" id="prod-sku" class="w-full px-3 py-2 border rounded-md"></div>
                                <div><label class="block text-sm font-medium mb-1">Categoría</label><select id="prod-categoria" required class="w-full px-3 py-2 border rounded-md"></select></div>
                            </div>

                            <div class="bg-slate-50 p-6 rounded-lg border border-slate-200">
                                <h4 class="font-bold text-slate-700 mb-4">Conversión de Unidades</h4>
                                
                                <div class="grid grid-cols-4 gap-4 items-end mb-4">
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">1. Unidad COMPRA</label><select id="prod-u-compra" required class="w-full px-3 py-2 border rounded-md bg-white"></select></div>
                                    <div class="text-center pb-2 text-slate-400 font-bold">▶ Contiene ▶</div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Cant. de UA por Compra</label><input type="number" step="0.01" id="prod-cant-ua" required class="w-full px-3 py-2 border rounded-md"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">2. Unidad ALMACEN</label><select id="prod-u-almacen" required class="w-full px-3 py-2 border rounded-md bg-white"></select></div>
                                </div>

                                <div class="grid grid-cols-4 gap-4 items-end mb-4">
                                    <div></div>
                                    <div class="text-center pb-2 text-slate-400 font-bold">▶ Contiene ▶</div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Cant. de UM por UA</label><input type="number" step="0.01" id="prod-cant-um" required class="w-full px-3 py-2 border rounded-md"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">3. Unidad MENOR</label><select id="prod-u-menor" required class="w-full px-3 py-2 border rounded-md bg-white"></select></div>
                                </div>

                                <div class="grid grid-cols-4 gap-4 items-end">
                                    <div></div>
                                    <div class="text-center pb-2 text-slate-400 font-bold">▶ Contiene ▶</div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Cant. de UR por UM</label><input type="number" step="0.01" id="prod-cant-ur" required class="w-full px-3 py-2 border rounded-md"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">4. Unidad RECETA</label><select id="prod-u-receta" required class="w-full px-3 py-2 border rounded-md bg-white"></select></div>
                                </div>
                            </div>

                            <div class="flex justify-end gap-4">
                                <button type="button" onclick="ocultarFormProducto()" class="px-6 py-2 border text-gray-700 rounded-md">Cancelar</button>
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md font-bold">Guardar</button>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">SKU</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">U. Compra</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">U. Receta</th>
                                </tr>
                            </thead>
                            <tbody id="lista-productos" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>

</body>
</html>

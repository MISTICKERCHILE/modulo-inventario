<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    
    <script>
        if (typeof process === 'undefined') {
            window.process = { env: { NODE_ENV: 'development' } };
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div id="login-container" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6"><div class="text-4xl mb-4">📦</div><h1 class="text-2xl font-bold">Módulo - Inventario</h1></div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo" required class="w-full px-3 py-2 border rounded-md outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="password" id="password" placeholder="Contraseña" required class="w-full px-3 py-2 border rounded-md outline-none focus:ring-2 focus:ring-emerald-500">
                <button type="submit" class="w-full py-2 bg-emerald-600 text-white rounded-md font-medium hover:bg-emerald-700 transition-colors">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden min-h-screen flex flex-col relative">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm z-20">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="text-slate-500 hover:bg-slate-100 p-2 rounded-md transition-colors outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <span class="text-2xl">📦</span>
                <h1 class="text-xl font-bold">Módulo - Inventario</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-email-display" class="text-sm font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200"></span>
                <button onclick="cerrarSesion()" class="text-sm text-red-600 font-medium hover:underline">Cerrar Sesión</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            
            <aside id="sidebar-menu" class="w-64 bg-slate-800 text-white flex flex-col p-4 space-y-2 z-10 transition-all duration-300 ease-in-out overflow-hidden whitespace-nowrap">
                <button onclick="cambiarVista('catalogos')" id="btn-menu-catalogos" class="w-full flex items-center gap-3 px-4 py-3 bg-emerald-600 rounded-lg font-medium transition-colors"><span>🏷️</span> <span class="menu-texto">Catálogos</span></button>
                <button onclick="cambiarVista('productos')" id="btn-menu-productos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🍔</span> <span class="menu-texto">Productos</span></button>
                <button onclick="cambiarVista('recetas')" id="btn-menu-recetas" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>📝</span> <span class="menu-texto">Recetas</span></button>
                
                <div class="my-2 border-t border-slate-700"></div>
                
                <button onclick="cambiarVista('inventario')" id="btn-menu-inventario" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>📦</span> <span class="menu-texto">Inventario Físico</span></button>
                <button onclick="cambiarVista('compras')" id="btn-menu-compras" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🛒</span> <span class="menu-texto">Compras / Pedidos</span></button>
            </aside>

            <main class="flex-1 p-8 overflow-y-auto relative">
                
                <div id="vista-catalogos" class="max-w-4xl mx-auto block">
                    <h2 class="text-2xl font-bold mb-6">Gestión de Catálogos</h2>
                    <div class="flex border-b border-gray-200 mb-6 overflow-x-auto bg-white rounded-t-lg shadow-sm">
                        <button onclick="cambiarTab('categorias')" id="tab-categorias" class="px-6 py-3 font-medium border-b-2 border-emerald-600 text-emerald-600 bg-emerald-50/50">Categorías</button>
                        <button onclick="cambiarTab('unidades')" id="tab-unidades" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors">Unidades</button>
                        <button onclick="cambiarTab('proveedores')" id="tab-proveedores" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors">Proveedores</button>
                        <button onclick="cambiarTab('sucursales')" id="tab-sucursales" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors">Sucursales</button>
                        <button onclick="cambiarTab('ubicaciones')" id="tab-ubicaciones" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 transition-colors">Ubicaciones</button>
                    </div>

                    <div id="seccion-categorias" class="block space-y-4">
                        <form id="form-categoria" class="bg-white p-6 rounded-xl shadow-sm border flex gap-4">
                            <input type="text" id="nombre-categoria" placeholder="Nueva Categoría" required class="flex-1 px-4 py-2 border rounded-md">
                            <button type="button" id="btn-cancelar-categoria" onclick="cancelarEdicion('categoria')" class="hidden px-4 py-2 border text-gray-600 rounded-md">Cancelar</button>
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md transition-colors">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><ul id="lista-categorias" class="divide-y divide-gray-100"></ul></div>
                    </div>

                    <div id="seccion-unidades" class="hidden space-y-4">
                        <form id="form-unidad" class="bg-white p-6 rounded-xl shadow-sm border flex gap-4">
                            <input type="text" id="nombre-unidad" placeholder="Nombre (Ej: Kilo)" required class="flex-1 px-4 py-2 border rounded-md">
                            <input type="text" id="abrev-unidad" placeholder="Abrev (Ej: kg)" required class="w-32 px-4 py-2 border rounded-md">
                            <button type="button" id="btn-cancelar-unidad" onclick="cancelarEdicion('unidad')" class="hidden px-4 py-2 border text-gray-600 rounded-md">Cancelar</button>
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md transition-colors">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><ul id="lista-unidades" class="divide-y divide-gray-100"></ul></div>
                    </div>

                    <div id="seccion-proveedores" class="hidden space-y-4">
                        <form id="form-proveedor" class="bg-white p-6 rounded-xl shadow-sm border grid grid-cols-2 gap-4">
                            <input type="text" id="nombre-proveedor" placeholder="Nombre Proveedor" required class="col-span-2 px-4 py-2 border rounded-md">
                            <input type="text" id="contacto-proveedor" placeholder="Contacto (Opcional)" class="px-4 py-2 border rounded-md">
                            <input type="number" id="tiempo-entrega" placeholder="Días entrega (Opcional)" class="px-4 py-2 border rounded-md">
                            <div class="col-span-2 flex justify-end gap-2">
                                <button type="button" id="btn-cancelar-proveedor" onclick="cancelarEdicion('proveedor')" class="hidden px-4 py-2 border text-gray-600 rounded-md">Cancelar</button>
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md transition-colors">Guardar</button>
                            </div>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><ul id="lista-proveedores" class="divide-y divide-gray-100"></ul></div>
                    </div>

                    <div id="seccion-sucursales" class="hidden space-y-4">
                        <form id="form-sucursal" class="bg-white p-6 rounded-xl shadow-sm border flex gap-4">
                            <input type="text" id="nombre-sucursal" placeholder="Nombre Sucursal" required class="flex-1 px-4 py-2 border rounded-md">
                            <input type="text" id="dir-sucursal" placeholder="Dirección (Opcional)" class="flex-1 px-4 py-2 border rounded-md">
                            <button type="button" id="btn-cancelar-sucursal" onclick="cancelarEdicion('sucursal')" class="hidden px-4 py-2 border text-gray-600 rounded-md">Cancelar</button>
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md transition-colors">Guardar</button>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><ul id="lista-sucursales" class="divide-y divide-gray-100"></ul></div>
                    </div>

                    <div id="seccion-ubicaciones" class="hidden space-y-4">
                        <form id="form-ubicacion" class="bg-white p-6 rounded-xl shadow-sm border grid grid-cols-2 gap-4">
                            <select id="sel-sucursal-ubi" required class="px-4 py-2 border rounded-md bg-white"></select>
                            <input type="text" id="nombre-ubicacion" placeholder="Ubicación Interna" required class="px-4 py-2 border rounded-md">
                            <div class="col-span-2 flex justify-end gap-2">
                                <button type="button" id="btn-cancelar-ubicacion" onclick="cancelarEdicion('ubicacion')" class="hidden px-4 py-2 border text-gray-600 rounded-md">Cancelar</button>
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md transition-colors">Guardar</button>
                            </div>
                        </form>
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><ul id="lista-ubicaciones" class="divide-y divide-gray-100"></ul></div>
                    </div>
                </div>

                <div id="vista-productos" class="max-w-6xl mx-auto hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Catálogo de Productos</h2>
                        <button onclick="abrirModalProducto()" class="px-4 py-2 bg-emerald-600 text-white rounded-md font-medium shadow-sm hover:bg-emerald-700 transition-colors">+ Nuevo Producto</button>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-slate-50"><tr>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Nombre</th>
                                <th class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase">Estado</th>
                                <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase">Ver Opciones</th>
                            </tr></thead>
                            <tbody id="lista-productos" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <div id="vista-recetas" class="max-w-5xl mx-auto hidden">
                    <div class="bg-emerald-700 text-white p-6 rounded-t-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div class="w-full md:w-1/2">
                            <h2 class="text-2xl font-bold mb-3" id="receta-titulo">Gestión de Recetas</h2>
                            <select id="buscador-recetas" onchange="seleccionarRecetaDesdeBuscador(this.value)" class="w-full px-3 py-2 text-slate-800 rounded-md font-medium outline-none shadow-sm"></select>
                            <p class="text-emerald-200 text-sm mt-2 hidden" id="receta-unidad-base">Unidad base: -</p>
                        </div>
                        <div id="panel-estadisticas-receta" class="hidden bg-emerald-800 p-4 rounded-lg flex gap-6 items-center border border-emerald-600">
                            <div>
                                <label class="block text-xs text-emerald-300 font-bold mb-1">Rendimiento Real</label>
                                <div class="flex items-center gap-2">
                                    <input type="number" step="0.01" id="receta-rendimiento" class="w-24 px-2 py-1 text-slate-800 rounded font-

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans">

    <div id="login-container" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
        <div class="text-center mb-6">
            <div class="text-4xl mb-4">📦</div>
            <h1 class="text-2xl font-bold text-slate-800">Módulo - Inventario</h1>
            <p class="text-slate-500 text-sm">Inicia sesión para continuar</p>
        </div>
        
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-emerald-500 focus:border-emerald-500">
            </div>
            <div id="login-error" class="text-red-500 text-sm font-medium hidden">❌ Correo o contraseña incorrectos.</div>
            <button type="submit" id="btn-login" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
                Entrar
            </button>
        </form>
    </div>

    <div id="dashboard-container" class="hidden w-full max-w-5xl p-8 absolute top-0">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Panel de Control</h1>
                <p id="user-email" class="text-sm text-emerald-600 font-medium"></p>
            </div>
            <button onclick="cerrarSesion()" class="text-sm font-medium text-red-600 hover:underline">Cerrar Sesión</button>
        </div>
        
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center">
            <div class="text-5xl mb-4">🚧</div>
            <h2 class="text-xl font-bold text-slate-700">¡Has entrado con éxito!</h2>
            <p class="text-slate-500 mt-2">Pronto construiremos aquí tus tablas de inventario y recetas.</p>
        </div>
    </div>
    <script>
        // ⚠️ IMPORTANTE: Tus datos de Supabase (Correctos)
    const supabaseUrl = 'https://gdtrkrnxkhiqimvmfrms.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdHJrcm54a2hpcWltdm1mcm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjYyODcsImV4cCI6MjA4ODA0MjI4N30.IYJR0fsehO0nXZ5YdEQ53S7Q1Z0e8qYSWdDeQkcTDS0';
    const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('login-form');
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const loginError = document.getElementById('login-error');

        // 2. FUNCIÓN DE INICIO DE SESIÓN
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue
            loginError.classList.add('hidden'); // Ocultar error previo

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Pedir a Supabase que valide al usuario
            const { data, error } = await clienteSupabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                console.error("Error al entrar:", error.message);
                loginError.classList.remove('hidden');
            } else {
                console.log("¡Sesión iniciada!", data);
                // Ocultar login y mostrar dashboard
                loginContainer.classList.add('hidden');
                dashboardContainer.classList.remove('hidden');
                document.getElementById('user-email').innerText = "Usuario: " + data.user.email;
            }
        });

        // 3. FUNCIÓN PARA CERRAR SESIÓN
        async function cerrarSesion() {
            await clienteSupabase.auth.signOut();
            // Ocultar dashboard y mostrar login
            dashboardContainer.classList.add('hidden');
            loginContainer.classList.remove('hidden');
            document.getElementById('password').value = ''; // Limpiar contraseña
        }
    </script>
</body>
</html>

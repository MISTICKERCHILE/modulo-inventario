<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    <script>
        if (typeof process === 'undefined') { window.process = { env: { NODE_ENV: 'development' } }; }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div id="login-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6"><div class="text-4xl mb-4">📦</div><h1 class="text-2xl font-bold">Módulo - Inventario</h1></div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo" required class="w-full px-3 py-3 border rounded-md outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="password" id="password" placeholder="Contraseña" required class="w-full px-3 py-3 border rounded-md outline-none focus:ring-2 focus:ring-emerald-500">
                <button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-md font-bold hover:bg-emerald-700 transition-colors">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden h-screen flex flex-col relative overflow-hidden">
        
        <header class="bg-white border-b px-4 md:px-6 py-3 md:py-4 flex justify-between items-center shadow-sm z-50 shrink-0">
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="toggleMenu()" class="text-slate-500 hover:bg-slate-100 p-2 rounded-md transition-colors outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" onclick="cambiarVista('dashboard')" title="Ir al Dashboard">
                    <span class="text-xl md:text-2xl">📦</span><h1 class="text-lg md:text-xl font-bold hidden sm:block">Módulo - Inventario</h1>
                </div>
            </div>
            
            <div class="flex items-center gap-3 md:gap-4 relative">
                <div class="relative">
                    <button onclick="toggleNotificaciones()" class="text-slate-400 hover:text-emerald-600 transition-colors relative outline-none p-1" title="Notificaciones">
                        <span class="text-2xl">🔔</span>
                        <span class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full transform translate-x-1 -translate-y-0.5 hidden shadow-sm" id="bell-indicator">!</span>
                    </button>
                    <div id="panel-notificaciones" class="hidden absolute right-0 mt-2 w-72 md:w-80 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 overflow-hidden">
                        <div class="px-4 py-3 border-b border-slate-50 bg-slate-50 flex justify-between items-center">
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wider">Notificaciones</p>
                            <span class="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold" id="bell-badge-text">0</span>
                        </div>
                        <div class="max-h-80 overflow-y-auto divide-y divide-slate-50" id="lista-notificaciones"></div>
                    </div>
                </div>
                
                <span id="user-name-display" class="hidden sm:block text-sm font-bold text-slate-600 bg-slate-100 px-4 py-2 rounded-full border border-slate-200 truncate max-w-[150px]">...</span>
                
                <div class="relative">
                    <button onclick="toggleUserMenu()" class="text-slate-500 hover:bg-slate-200 px-2 py-1 rounded-md text-xl font-bold outline-none transition-colors">⋮</button>
                    <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-2xl border border-slate-100 z-50 overflow-hidden">
                        <div class="px-4 py-3 border-b border-slate-50 bg-slate-50">
                            <p class="text-xs text-slate-400 font-bold uppercase">Cuenta</p>
                            <p id="user-email-dropdown" class="text-xs font-medium text-slate-700 truncate mt-1">...</p>
                        </div>
                        <button onclick="cerrarSesion()" class="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50 font-bold transition-colors">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/60 z-30 hidden backdrop-blur-sm" onclick="toggleMenu()"></div>

            <aside id="sidebar-menu" class="w-64 bg-slate-800 text-white flex flex-col p-4 space-y-2 fixed md:relative inset-y-0 left-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out h-full overflow-y-auto shadow-2xl md:shadow-none shrink-0">
                <div class="flex justify-between items-center md:hidden mb-4 border-b border-slate-700 pb-2">
                    <span class="font-bold text-lg">Menú</span>
                    <button onclick="toggleMenu()" class="text-slate-300 hover:text-white text-3xl font-bold">&times;</button>
                </div>
            
                <button onclick="cambiarVista('inventario')" id="btn-menu-inventario" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>📦</span> <span class="menu-texto">Inventario Físico</span></button>
                <button onclick="cambiarVista('movimientos')" id="btn-menu-movimientos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🔄</span> <span class="menu-texto flex items-center gap-2">Movimientos <span id="badge-cart" class="hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm animate-pulse">0</span></span></button>
                <div class="my-2 border-t border-slate-700"></div>
                <button onclick="cambiarVista('productos')" id="btn-menu-productos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🍔</span> <span class="menu-texto">Productos</span></button>
                <button onclick="cambiarVista('recetas')" id="btn-menu-recetas" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>📝</span> <span class="menu-texto">Recetas</span></button>
                <button onclick="cambiarVista('reportes')" id="btn-menu-reportes" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>📊</span> <span class="menu-texto">Reportes</span></button>
                <button onclick="cambiarVista('catalogos')" id="btn-menu-catalogos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>⚙️</span> <span class="menu-texto">Catálogos</span></button>
            </aside>

            <main id="main-content" class="flex-1 p-4 md:p-8 overflow-y-auto w-full relative"></main>
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script src="js/catalogos.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/inventario.js"></script>
    <script src="js/movimientos.js"></script>
    <script src="js/reportes.js"></script>
</body>
</html>

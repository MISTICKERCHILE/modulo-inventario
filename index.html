<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div id="login-container" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6">
                <div class="text-4xl mb-4">📦</div>
                <h1 class="text-2xl font-bold">Módulo - Inventario</h1>
            </div>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo" required class="w-full px-3 py-2 border rounded-md">
                <input type="password" id="password" placeholder="Contraseña" required class="w-full px-3 py-2 border rounded-md">
                <button type="submit" class="w-full py-2 bg-emerald-600 text-white rounded-md font-medium">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2"><span class="text-2xl">📦</span><h1 class="text-xl font-bold">Inventario Pro</h1></div>
            <button onclick="cerrarSesion()" class="text-sm text-red-600 hover:text-red-800 font-medium">Cerrar Sesión</button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-64 bg-slate-800 text-white flex flex-col p-4 space-y-2">
                <button onclick="cambiarVista('catalogos')" id="btn-menu-catalogos" class="w-full flex items-center gap-3 px-4 py-3 bg-emerald-600 rounded-lg font-medium transition-colors"><span>🏷️</span> Catálogos</button>
                <button onclick="cambiarVista('productos')" id="btn-menu-productos" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors"><span>🍔</span> Productos</button>
            </aside>

            <main class="flex-1 p-8 overflow-y-auto">
                
                <div id="vista-catalogos" class="max-w-4xl mx-auto block">
                    <h2 class="text-2xl font-bold mb-6">Gestión de Catálogos Básicos</h2>
                    
                    <div class="flex border-b border-gray-200 mb-6 overflow-x-auto">
                        <button onclick="cambiarTab('categorias')" id="tab-categorias" class="px-6 py-3 font-medium text-emerald-600 border-b-2 border-emerald-600 bg-emerald-50/50 whitespace-nowrap">Categorías</button>
                        <button onclick="cambiarTab('unidades')" id="tab-unidades" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 whitespace-nowrap">Unidades</button>
                        <button onclick="cambiarTab('proveedores')" id="tab-proveedores" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 whitespace-nowrap">Proveedores</button>
                        <button onclick="cambiarTab('ubicaciones')" id="tab-ubicaciones" class="px-6 py-3 font-medium text-gray-500 hover:text-gray-700 whitespace-nowrap">Ubicaciones</button>
                    </div>

                    <div id="seccion-categorias" class="block">
                        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                            <form id="form-categoria" class="flex gap-4">
                                <input type="text" id="nombre-categoria" placeholder="Nueva Categoría (Ej: Carnes)" required class="flex-1 px-4 py-2 border rounded-md">
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                            </form>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-categorias" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-unidades" class="hidden">
                        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                            <form id="form-unidad" class="flex gap-4">
                                <input type="text" id="nombre-unidad" placeholder="Nombre (Ej: Caja)" required class="flex-1 px-4 py-2 border rounded-md">
                                <input type="text" id="abrev-unidad" placeholder="Abrev (Ej: CJ)" required class="w-32 px-4 py-2 border rounded-md">
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                            </form>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-unidades" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-proveedores" class="hidden">
                        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                            <form id="form-proveedor" class="grid grid-cols-2 gap-4">
                                <div class="col-span-2"><input type="text" id="nombre-proveedor" placeholder="Nombre del Proveedor / Empresa" required class="w-full px-4 py-2 border rounded-md"></div>
                                <div><input type="text" id="contacto-proveedor" placeholder="Nombre del Contacto" class="w-full px-4 py-2 border rounded-md"></div>
                                <div><input type="number" id="tiempo-entrega" placeholder="Días de entrega (Ej: 2)" class="w-full px-4 py-2 border rounded-md"></div>
                                <div class="col-span-2 text-right"><button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar Proveedor</button></div>
                            </form>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-proveedores" class="divide-y divide-gray-200"></ul></div>
                    </div>

                    <div id="seccion-ubicaciones" class="hidden">
                        <div class="bg-white p-6 rounded-xl shadow-sm border mb-6">
                            <form id="form-ubicacion" class="flex gap-4">
                                <input type="text" id="nombre-ubicacion" placeholder="Nombre (Ej: Bodega Central, Estante 1)" required class="flex-1 px-4 py-2 border rounded-md">
                                <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md">Guardar</button>
                            </form>
                        </div>
                        <div class="bg-white rounded-xl shadow-sm border"><ul id="lista-ubicaciones" class="divide-y divide-gray-200"></ul></div>
                    </div>
                </div>

                <div id="vista-productos" class="max-w-6xl mx-auto hidden">
                    </div>

            </main>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

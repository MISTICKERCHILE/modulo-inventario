<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <div id="login-container" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <div class="text-center mb-6">
                <div class="text-4xl mb-4">📦</div>
                <h1 class="text-2xl font-bold">Módulo - Inventario</h1>
                <p class="text-slate-500 text-sm">Inicia sesión para continuar</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Correo</label>
                    <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-emerald-500 focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium">Contraseña</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-emerald-500 focus:border-emerald-500">
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden">❌ Error en credenciales.</div>
                <button type="submit" class="w-full py-2 px-4 text-white bg-emerald-600 hover:bg-emerald-700 rounded-md font-medium">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-2">
                <span class="text-2xl">📦</span>
                <h1 class="text-xl font-bold">Inventario Pro</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-email" class="text-sm font-medium text-slate-500"></span>
                <button onclick="cerrarSesion()" class="text-sm text-red-600 hover:text-red-800 font-medium">Cerrar Sesión</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            
            <aside class="w-64 bg-slate-800 text-white flex flex-col">
                <nav class="flex-1 px-4 py-6 space-y-2">
                    <button class="w-full flex items-center gap-3 px-4 py-3 bg-emerald-600 rounded-lg font-medium transition-colors">
                        <span>🏷️</span> Catálogos
                    </button>
                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors opacity-50 cursor-not-allowed">
                        <span>🍔</span> Productos (Pronto)
                    </button>
                    <button class="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-700 rounded-lg font-medium transition-colors opacity-50 cursor-not-allowed">
                        <span>📊</span> Movimientos (Pronto)
                    </button>
                </nav>
            </aside>

            <main class="flex-1 p-8 bg-slate-50 overflow-y-auto">
                
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-2xl font-bold mb-6">Gestión de Categorías</h2>
                    
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                        <form id="form-categoria" class="flex gap-4 items-end">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nueva Categoría</label>
                                <input type="text" id="nombre-categoria" placeholder="Ej: Carnes, Bebidas, Empaques..." required class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-emerald-500 focus:border-emerald-500">
                            </div>
                            <button type="submit" class="px-6 py-2 bg-slate-800 text-white rounded-md hover:bg-slate-700 font-medium">Guardar</button>
                        </form>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-200 bg-slate-50">
                            <h3 class="font-bold text-slate-700">Categorías Registradas</h3>
                        </div>
                        <ul id="lista-categorias" class="divide-y divide-gray-200">
                            <li class="px-6 py-4 text-center text-slate-500 text-sm">Cargando categorías...</li>
                        </ul>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DE SUPABASE ---
        const supabaseUrl = 'https://gdtrkrnxkhiqimvmfrms.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkdHJrcm54a2hpcWltdm1mcm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjYyODcsImV4cCI6MjA4ODA0MjI4N30.IYJR0fsehO0nXZ5YdEQ53S7Q1Z0e8qYSWdDeQkcTDS0'; // ⚠️ NO OLVIDES PEGARLA AQUÍ
        const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 2. LÓGICA DE LOGIN ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await clienteSupabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('login-error').classList.remove('hidden');
            } else {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
                document.getElementById('user-email').innerText = data.user.email;
                cargarCategorias(); // Cargamos los datos al entrar
            }
        });

        async function cerrarSesion() {
            await clienteSupabase.auth.signOut();
            document.getElementById('dashboard-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
        }

        // --- 3. LÓGICA DE CATEGORÍAS ---
        const listaCategorias = document.getElementById('lista-categorias');
        const formCategoria = document.getElementById('form-categoria');

        // Función para leer categorías de la base de datos
        async function cargarCategorias() {
            const { data, error } = await clienteSupabase.from('categorias').select('*').order('nombre', { ascending: true });
            
            if (error) {
                console.error("Error al cargar:", error);
                return;
            }

            listaCategorias.innerHTML = ''; // Limpiamos la lista

            if (data.length === 0) {
                listaCategorias.innerHTML = '<li class="px-6 py-4 text-center text-slate-500 text-sm">No hay categorías registradas aún.</li>';
                return;
            }

            // Dibujamos cada categoría en la pantalla
            data.forEach(categoria => {
                const li = document.createElement('li');
                li.className = 'px-6 py-4 flex justify-between items-center hover:bg-slate-50';
                li.innerHTML = `
                    <span class="font-medium text-slate-700">${categoria.nombre}</span>
                    <button onclick="borrarCategoria('${categoria.id}')" class="text-red-500 hover:text-red-700 text-sm font-medium">Eliminar</button>
                `;
                listaCategorias.appendChild(li);
            });
        }

        // Función para guardar una nueva categoría
        formCategoria.addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputNombre = document.getElementById('nombre-categoria');
            const nombre = inputNombre.value.trim();

            const { error } = await clienteSupabase.from('categorias').insert([{ nombre: nombre }]);

            if (error) {
                alert("Error al guardar: " + error.message);
            } else {
                inputNombre.value = ''; // Limpiar el input
                cargarCategorias(); // Recargar la lista
            }
        });

        // Función para borrar una categoría
        async function borrarCategoria(id) {
            if(confirm("¿Estás seguro de eliminar esta categoría?")) {
                const { error } = await clienteSupabase.from('categorias').delete().eq('id', id);
                if(error) {
                    alert("No se puede eliminar: " + error.message);
                } else {
                    cargarCategorias(); // Recargar la lista
                }
            }
        }
    </script>
</body>
</html>
